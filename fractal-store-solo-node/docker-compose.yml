version: "3.7"

services:

  # Required by Umbrel: handles auth proxy and routing to APP_PORT
  app_proxy:
    environment:
      APP_HOST: fractal-store-solo-node_web_1
      APP_PORT: 3000

  # Dashboard web UI (Node.js static server + RPC proxy)
  web:
    image: node:18-alpine
    container_name: fractal-store-solo-node_web_1
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - node
    working_dir: /app
    command: node server.js
    volumes:
      - ${APP_DATA_DIR}/dashboard:/app:ro
    environment:
      FRACTAL_RPC_HOST: fractal-store-solo-node_node_1
      FRACTAL_RPC_PORT: "10332"
      FRACTAL_RPC_USER: fractal
      FRACTAL_RPC_PASS: "${APP_PASSWORD}"
      DASHBOARD_PORT: "3000"

  # Fractal Bitcoin full node
  # Uses official binary downloaded at startup (no pre-built image on Docker Hub)
  node:
    image: wvk2017/nodes:fractal-bitcoin
    container_name: fractal-store-solo-node_node_1
    restart: on-failure
    stop_grace_period: 5m
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/bin:/opt/fractal
    environment:
      VERSION: "0.3.0"
    command: >
      bash -c "
     FROM ubuntu:22.04
     RUN apt-get update -y
     RUN apt-get install wget -y
     WORKDIR /opt/
     RUN wget https://github.com/fractal-bitcoin/fractald-release/releases/download/v0.3.0/fractald-0.3.0-x86_64-linux-gnu.tar.gz
     RUN tar zxvf fractald-0.3.0-x86_64-linux-gnu.tar.gz
     RUN mv fractald-0.3.0-x86_64-linux-gnu/bin/* /usr/bin/
     CMD /usr/bin/bitcoind -printtoconsole
        fi
        mkdir -p /data
        exec $$BINARY \
          -datadir=/data \
          -maxtipage=504576000 \
          -server=1 \
          -rpcuser=fractal \
          -rpcpassword=$${FRACTAL_RPC_PASS:-fractalnode} \
          -rpcallowip=0.0.0.0/0 \
          -rpcbind=0.0.0.0 \
          -rpcport=10332 \
          -port=8333 \
          -maxconnections=25 \
          -prune=5000
      "
    environment:
      FRACTAL_RPC_PASS: "${APP_PASSWORD}"
