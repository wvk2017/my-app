manifestVersion: 1
id: retro-mike-miningcore-webui-legacy
name: MiningCore Web UI (Legacy)
tagline: Web UI for the MiningCore Mining Pool App. Legacy Version for the Legacy Miningcore App
icon: https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
category: SOLO Crypto Mining
version: "2.4.0"
port: 8562
description: |
  Web UI for the MiningCore Mining Pool App. For a full functioning app, you will also need to install the MiningCore App. Legacy Version for the Legacy Miningcore App
  
  If you find this app useful, please consider donating

  https://throne.com/retromike

developer: Retro Mike
website: http://retromiketech.com
submitter: Retro Mike
submission: https://hub.docker.com/r/theretromike/miningcorewebui
repo: https://hub.docker.com/r/theretromike/miningcorewebui
support: https://hub.docker.com/r/theretromike/miningcorewebui
gallery:
  - https://raw.githubusercontent.com/TheRetroMike/retromike-umbrel-app-store/master/retro-mike-miningcore-webui/webui.png
releaseNotes: |   
  2026.03.14 - Added Litecoin Cash
  2025.02.10 - Fixed port mapping for running legacy side by side with normal. Please update if you are trying to mine Monero.
  2025.01.18 - Initial Release
widgets:
  - id: "page1"
    type: "list"
    refresh: "5s"
    endpoint: "web:8080/api/PoolStatsWidget/0"
    link: ""
    example:
      type: "list"
      link: ""
      items:
        - text: "Bitcoin | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
        - text: "Bitcoin Cash | 1.2 TH/s | 1 Blocks"
          subtext: "Last Synced Block: 01/12/2026 10:12:34"
