version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: retro-mike-btcs-node_web_1
      APP_PORT: 8080
  web:
    image: amir20/dozzle:v8.12.8@sha256:8ff3115c9c9dd7576839df6f2575de345ca7cafa398cf2496f1f19c31d862ac1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure
    depends_on:
      - node
  node:
    image: theretromike/nodes:bitcoinsilver
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.bitcoinsilver:/root/.bitcoinsilver
    ports:
      - 9015:9015    # RPC
      - 7015:7015    # ZMQ
    entrypoint: "bitcoinsilverd -printtoconsole -server -prune=550 -wallet=default -zmqpubhashblock=tcp://127.0.0.1:7015 -rpcbind=0.0.0.0 -rpcport=9015 -rpcallowip=0.0.0.0/0 -rpcuser=pooluser -rpcpassword=poolpassword -addnode=addnode=38.49.216.154:47512 -addnode=addnode=85.215.252.249:10566 -addnode=162.19.244.187:47134 -addnode=195.154.167.36:10566 -addnode164.68.125.48:36822 -addnode=82.165.45.164:37036 -addnode=190.2.145.93:5034 -addnode=162.19.28.235:57382 -addnode=81.181.166.76:10566"
